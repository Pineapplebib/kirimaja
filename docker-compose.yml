version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kirimaja-app
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - laravel-net

  web:
    image: nginx:latest
    container_name: kirimaja-nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - laravel-net

  db:
    image: mysql:8.0
    container_name: kirimaja-db
    restart: always
    environment:
      MYSQL_DATABASE: kirimaja
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: kirimaja
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    networks:
      - laravel-net

networks:
  laravel-net:
    driver: bridge
